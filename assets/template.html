<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        {%base_css%}
        {%pygments_css%}

        .mermaid {
            display: flex;
            justify-content: center;
            margin: 1.5em 0;
        }

        {%ui_css%}
    </style>
    <script>{%mermaid_js%}</script>
    <script>
        window.MathJax = {
            tex: {
                packages: {'[+]': ['ams', 'textmacros', 'physics', 'color']},
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\]']],
                processEscapes: true,
                processEnvironments: true
            },
            options: {
                skipHtmlTags: ['script', 'noscript', 'style', 'textarea', 'pre']
            }
        };
    </script>
    <script>{%mathjax_js%}</script>
    <script>{%glass_js%}</script>
</head>
<body>
    <div class="container">
        {%content%}
    </div>

    <!-- Blur gradients -->
    <div class="blur-gradient top"></div>
    <div class="blur-gradient bottom"></div>

    <!-- Floating toolbar -->
    <div id="toolbar">
        <!-- Search: circle that morphs into pill -->
        <div id="search-container">
            <div id="search-bar" role="search">
                <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" width="16"
                    height="16">
                    <circle cx="11" cy="11" r="7" />
                    <line x1="16.5" y1="16.5" x2="21" y2="21" />
                </svg>
                <input id="search-input" type="text" placeholder="Buscar..." autocomplete="off" spellcheck="false" />
                <div class="search-controls">
                    <span id="search-counter"></span>
                    <div class="search-pill">
                        <button id="search-prev" title="Anterior">&#9650;</button>
                        <span class="pill-sep">|</span>
                        <button id="search-next" title="Siguiente">&#9660;</button>
                        <span class="pill-sep">|</span>
                        <button id="search-close" title="Cerrar">&#10005;</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Pin button -->
        <button id="pin-btn" class="glass-btn" title="Siempre al frente" aria-pressed="true">
            <svg class="pin-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="16"
                height="16">
                <path d="M16 9V4h1a1 1 0 0 0 0-2H7a1 1 0 0 0 0 2h1v5l-2 3v2h5v5l1 1 1-1v-5h5v-2l-2-3z" />
            </svg>
        </button>
    </div>

    <script>{%ui_js%}</script>
</body>
</html>
